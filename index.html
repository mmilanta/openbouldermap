<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OpenBoulderMap — Switzerland</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/node_modules/maplibre-gl/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <aside id="sidebar" class="hidden">
        <button id="sidebar-close" title="Close">&times;</button>
        <div id="sidebar-content"></div>
      </aside>
      <div id="attribution">
        Data © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors
        · Elevation: <a href="https://spacedata.copernicus.eu/web/cscda/data-access" target="_blank" rel="noopener">Copernicus DEM</a>
      </div>
      <div id="theme-switcher">
        <label for="theme-select" class="theme-label">🎨 Map style:</label>
        <select id="theme-select"></select>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
