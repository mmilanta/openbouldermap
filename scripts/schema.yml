schema_name: openbouldermap-climbing
schema_description: 'OpenBoulderMap — climbing features (boulders + routes), derived from OpenStreetMap.'
attribution: '&copy; OpenStreetMap contributors'

sources:
  osm:
    type: osm
    local_path: data/climbing-filtered.osm.pbf

tag_mappings:
  'climbing:grade:font': string
  'climbing:start': string
  'climbing:fa': string
  'climbing:length': integer
  'climbing:boulder': string
  wikimedia_commons: string
  'wikimedia_commons:path': string
  'wikimedia_commons:2': string
  'wikimedia_commons:2:path': string

layers:

  # ---- boulder polygons: climbing=boulder & natural=bare_rock/stone & sport=climbing ----
  - id: boulders
    features:
      - source: osm
        geometry: polygon
        min_zoom: 12
        include_when:
          __all__:
            - climbing: boulder
            - natural: [bare_rock, stone]
            - sport: climbing
        attributes:
          - { key: name, tag_value: name }
          - { key: description, tag_value: description }
          - { key: wikimedia_commons, tag_value: wikimedia_commons }
          - { key: osm_type, value: '${ feature.osm_type }' }
          - { key: osm_id, value: '${ feature.id }', type: long }

  # ---- boulder points: climbing=boulder & natural=stone & sport=climbing ----
  # The 227 named boulder markers in Chironico (e.g. "Sector 6 Boulder 42")
  - id: boulder_points
    features:
      - source: osm
        geometry: point
        min_zoom: 14
        include_when:
          __all__:
            - climbing: boulder
            - natural: stone
            - sport: climbing
        attributes:
          - { key: name, tag_value: name }
          - { key: osm_type, value: '${ feature.osm_type }' }
          - { key: osm_id, value: '${ feature.id }', type: long }

  # ---- bouldering sectors: climbing:boulder=yes (areas) ----
  # e.g. "Magic Wood", "Paese Sector", "Minimum Boulder Flüela"
  - id: sectors
    features:
      - source: osm
        geometry: polygon
        min_zoom: 12
        include_when:
          climbing:boulder: 'yes'
        attributes:
          - { key: name, tag_value: name }
          - { key: description, tag_value: description }
          - { key: url, tag_value: url }
          - { key: website, tag_value: website }
          - { key: osm_type, value: '${ feature.osm_type }' }
          - { key: osm_id, value: '${ feature.id }', type: long }

  # ---- routes: climbing=route_bottom points ----
  - id: routes
    features:
      - source: osm
        geometry: point
        min_zoom: 13
        include_when:
          climbing: route_bottom
        attributes:
          - { key: name, tag_value: name }
          - { key: 'climbing:grade:font', tag_value: 'climbing:grade:font' }
          - { key: 'climbing:start', tag_value: 'climbing:start' }
          - { key: description, tag_value: description }
          - { key: 'climbing:fa', tag_value: 'climbing:fa' }
          - { key: 'climbing:length', tag_value: 'climbing:length', type: integer }
          - { key: url, tag_value: url }
          - { key: wikimedia_commons, tag_value: wikimedia_commons }
          - { key: 'wikimedia_commons:path', tag_value: 'wikimedia_commons:path' }
          - { key: image, tag_value: image }
          - { key: osm_type, value: '${ feature.osm_type }' }
          - { key: osm_id, value: '${ feature.id }', type: long }
